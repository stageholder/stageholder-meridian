steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          -t $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:$COMMIT_SHA \
          -t $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:latest \
          --build-arg GITHUB_PACKAGES_TOKEN=$_GITHUB_PACKAGES_TOKEN \
          -f apps/api/Dockerfile \
          .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:$COMMIT_SHA
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - gcloud
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --port=4000
      - --allow-unauthenticated

substitutions:
  _GCR_HOSTNAME: gcr.io
  _SERVICE_NAME: stageholder-meridian-api
  _DEPLOY_REGION: asia-southeast1
  # _GITHUB_PACKAGES_TOKEN must be set as a substitution on the Cloud Build
  # trigger (PAT with read:packages scope on the stageholder-identity repo).
  # Visible in build logs — keep build-log access restricted.
  _GITHUB_PACKAGES_TOKEN: ""

options:
  logging: CLOUD_LOGGING_ONLY
