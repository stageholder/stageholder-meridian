steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          -t $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:$COMMIT_SHA \
          -t $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:latest \
          --build-arg GITHUB_PACKAGES_TOKEN=$$GITHUB_PACKAGES_TOKEN \
          -f apps/api/Dockerfile \
          .
    secretEnv: ["GITHUB_PACKAGES_TOKEN"]
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:$COMMIT_SHA
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - gcloud
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/api:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --port=4000
      - --allow-unauthenticated

substitutions:
  _GCR_HOSTNAME: gcr.io
  _SERVICE_NAME: stageholder-meridian-api
  _DEPLOY_REGION: asia-southeast1
  # _GITHUB_PACKAGES_SECRET points at the Secret Manager secret name that
  # holds a PAT with read:packages scope on the stageholder-identity repo.
  _GITHUB_PACKAGES_SECRET: github-packages-token

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/$_GITHUB_PACKAGES_SECRET/versions/latest
      env: GITHUB_PACKAGES_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY
