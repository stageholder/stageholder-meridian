steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          -t $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/pwa:$COMMIT_SHA \
          -t $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/pwa:latest \
          --build-arg VITE_API_URL=$_VITE_API_URL \
          --build-arg VITE_HUB_WEB_URL=$_VITE_HUB_WEB_URL \
          --build-arg VITE_PUBLIC_APP_URL=$_VITE_PUBLIC_APP_URL \
          --build-arg VITE_IDENTITY_ISSUER_URL=$_VITE_IDENTITY_ISSUER_URL \
          --build-arg VITE_IDENTITY_CLIENT_ID=$_VITE_IDENTITY_CLIENT_ID \
          --build-arg GITHUB_PACKAGES_TOKEN=$_GITHUB_PACKAGES_TOKEN \
          -f apps/pwa/Dockerfile \
          .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/pwa:$COMMIT_SHA
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/pwa:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - gcloud
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/pwa:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --port=4001
      - --allow-unauthenticated

substitutions:
  _GCR_HOSTNAME: gcr.io
  _SERVICE_NAME: stageholder-meridian-pwa
  _DEPLOY_REGION: asia-southeast1
  _VITE_API_URL: https://api.meridian.stageholder.com/api/v1
  _VITE_HUB_WEB_URL: https://id.stageholder.com
  _VITE_PUBLIC_APP_URL: https://meridian.stageholder.com
  _VITE_IDENTITY_ISSUER_URL: https://id.stageholder.com/oidc
  _VITE_IDENTITY_CLIENT_ID: meridian-web
  # _GITHUB_PACKAGES_TOKEN must be set as a substitution on the Cloud Build
  # trigger (PAT with read:packages scope on the stageholder-identity repo).
  # Visible in build logs — keep build-log access restricted.
  _GITHUB_PACKAGES_TOKEN: ""

options:
  logging: CLOUD_LOGGING_ONLY
