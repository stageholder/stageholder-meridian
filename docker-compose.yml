services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: meridian
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme-dev}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "meridian",
          "-p",
          "${MONGO_PASSWORD:-changeme-dev}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: mongodb://meridian:${MONGO_PASSWORD:-changeme-dev}@mongodb:27017/meridian?authSource=admin
      JWT_SECRET: change-me-in-production-must-be-32-chars
      FRONTEND_URL: http://localhost:3000
      PORT: "4000"
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)throw 1})",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  pwa:
    build:
      context: .
      dockerfile: apps/pwa/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      api:
        condition: service_healthy

volumes:
  mongo-data:
