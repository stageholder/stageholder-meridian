name: Release Desktop (x86_64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      notes:
        description: "Release notes"
        required: false
        type: string
        default: ""

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            platform_key: darwin-x86_64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform_key: linux-x86_64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform_key: windows-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: contains(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MERIDIAN_FRONTEND_URL: ${{ vars.MERIDIAN_FRONTEND_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          tauriScript: bunx tauri

      - name: Collect updater artifacts
        shell: bash
        run: |
          mkdir -p updater-staging
          find "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle" -type f \
            \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.AppImage" -o -name "*.AppImage.sig" -o -name "*-setup.exe" -o -name "*-setup.exe.sig" \) \
            -exec cp {} updater-staging/ \;
          echo "=== Updater artifacts ==="
          ls -la updater-staging/

      - name: Collect installer artifacts
        shell: bash
        run: |
          mkdir -p installer-staging
          find "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle" -type f \
            \( -name "*.dmg" -o -name "*.deb" -o -name "*-setup.exe" \) \
            ! -name "*.sig" \
            -exec cp {} installer-staging/ \;
          echo "=== Installer artifacts ==="
          ls -la installer-staging/

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.target }}
          path: updater-staging/
          if-no-files-found: error

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: installer-staging/
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          path: updater-artifacts
          pattern: updater-*

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installer-artifacts
          pattern: installer-*

      - name: Reorganize updater artifacts
        run: |
          for dir in updater-artifacts/updater-*; do
            target="${dir#updater-artifacts/updater-}"
            mkdir -p "updater-artifacts/${target}"
            find "$dir" -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.AppImage" -o -name "*.AppImage.sig" -o -name "*-setup.exe" -o -name "*-setup.exe.sig" \) -exec mv {} "updater-artifacts/${target}/" \;
            rm -rf "$dir"
          done

      - name: Reorganize installer artifacts
        run: |
          for dir in installer-artifacts/installer-*; do
            target="${dir#installer-artifacts/installer-}"
            mkdir -p "installer-artifacts/${target}"
            find "$dir" -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*-setup.exe" \) ! -name "*.sig" -exec mv {} "installer-artifacts/${target}/" \;
            rm -rf "$dir"
          done

      - name: Publish release
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          RELEASE_NOTES: ${{ github.event.inputs.notes }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PUBLIC_URL: ${{ vars.S3_PUBLIC_URL }}
          S3_REGION: ${{ vars.S3_REGION }}
        run: |
          chmod +x scripts/publish-desktop.sh
          UPDATER_DIR=updater-artifacts INSTALLER_DIR=installer-artifacts ./scripts/publish-desktop.sh "$RELEASE_VERSION" "$RELEASE_NOTES"
