name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      notes:
        description: "Release notes"
        required: false
        type: string
        default: ""

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            platform_key: darwin-aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            platform_key: darwin-x86_64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform_key: linux-x86_64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform_key: windows-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: contains(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MERIDIAN_FRONTEND_URL: ${{ vars.MERIDIAN_FRONTEND_URL }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          tauriScript: bunx tauri

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz.sig
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.zip
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.zip.sig
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: updater-*

      - name: Reorganize artifacts
        run: |
          for dir in artifacts/updater-*; do
            target="${dir#artifacts/updater-}"
            mkdir -p "artifacts/${target}"
            find "$dir" -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.zip" -o -name "*.zip.sig" \) -exec mv {} "artifacts/${target}/" \;
            rm -rf "$dir"
          done

      - name: Publish release
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          RELEASE_NOTES: ${{ github.event.inputs.notes }}
          VULTR_OBJ_ACCESS_KEY: ${{ secrets.VULTR_OBJ_ACCESS_KEY }}
          VULTR_OBJ_SECRET_KEY: ${{ secrets.VULTR_OBJ_SECRET_KEY }}
          VULTR_OBJ_REGION: ${{ vars.VULTR_OBJ_REGION }}
          VULTR_OBJ_BUCKET: ${{ vars.VULTR_OBJ_BUCKET }}
        run: |
          chmod +x scripts/publish-desktop.sh
          ARTIFACTS_DIR=artifacts ./scripts/publish-desktop.sh "$RELEASE_VERSION" "$RELEASE_NOTES"
