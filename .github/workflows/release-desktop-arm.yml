name: Release Desktop (ARM)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      notes:
        description: "Release notes"
        required: false
        type: string
        default: ""

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            platform_key: darwin-aarch64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            platform_key: linux-aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: contains(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MERIDIAN_FRONTEND_URL: ${{ vars.MERIDIAN_FRONTEND_URL }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          tauriScript: bunx tauri

      - name: Collect updater artifacts
        shell: bash
        run: |
          mkdir -p updater-staging
          find "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle" -type f \
            \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.AppImage" -o -name "*.AppImage.sig" -o -name "*-setup.exe" -o -name "*-setup.exe.sig" \) \
            -exec cp {} updater-staging/ \;
          echo "=== Staged files ==="
          ls -la updater-staging/

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meridian-${{ matrix.target }}
          path: updater-staging/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: meridian-*

      - name: Reorganize artifacts
        run: |
          for dir in artifacts/meridian-*; do
            target="${dir#artifacts/meridian-}"
            mkdir -p "artifacts/${target}"
            find "$dir" -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.AppImage" -o -name "*.AppImage.sig" -o -name "*-setup.exe" -o -name "*-setup.exe.sig" \) -exec mv {} "artifacts/${target}/" \;
            rm -rf "$dir"
          done

      - name: Publish release
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          RELEASE_NOTES: ${{ github.event.inputs.notes }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PUBLIC_URL: ${{ vars.S3_PUBLIC_URL }}
          S3_REGION: ${{ vars.S3_REGION }}
        run: |
          chmod +x scripts/publish-desktop.sh
          ARTIFACTS_DIR=artifacts ./scripts/publish-desktop.sh "$RELEASE_VERSION" "$RELEASE_NOTES"
