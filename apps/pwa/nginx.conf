# SPA static-serve config for Meridian PWA.
# Replaces the Next.js standalone runtime — the Vite build emits a fully
# static bundle that nginx serves directly. No Node/Bun process at runtime.
#
# - SPA fallback: any non-asset path returns index.html so TanStack Router
#   handles client-side navigation on direct deep-links / hard reloads.
# - Hashed asset files get 1-year immutable caching (filenames change on
#   every build, so cache invalidation is automatic).
# - index.html and sw.js are never cached so deploys take effect immediately.

server {
  listen 4001;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Standard SPA fallback — every unmatched path serves index.html and
  # lets TanStack Router resolve client-side. Static asset requests still
  # match the regex location block below first.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed bundle output: long-cache, immutable. Vite appends a content
  # hash to every emitted JS/CSS/font/image so filename collisions across
  # deploys are impossible.
  location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|avif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # The shell must never cache — a deploy that ships new asset hashes is
  # invisible until the client picks up the new index.html.
  location = /index.html {
    add_header Cache-Control "no-store, max-age=0";
  }

  # Same for the service worker — vite-plugin-pwa cache-busts via its own
  # registration logic, but nginx caching the SW file itself would defeat
  # autoUpdate. Never cache.
  location = /sw.js {
    add_header Cache-Control "no-store, max-age=0";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-store, max-age=0";
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-store, max-age=0";
  }

  # gzip for text assets — saves ~70% on the JS bundle.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Basic security headers (the in-app routes that needed CSP-scoped
  # framing for the OIDC frontchannel logout iframe are gone — the SPA
  # handles logout via the SDK without an iframe).
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
